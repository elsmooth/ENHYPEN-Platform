<!DOCTYPE html>
<html>
<body>
    <h2>Add New Shipment</h2>
    <form id="shipmentForm">
        <input type="text" id="tracking_number" placeholder="Tracking Number" required><br>
        <input type="text" id="status" placeholder="Status (e.g. In Transit)" required><br>
        <input type="text" id="origin" placeholder="Origin" required><br>
        <input type="text" id="destination" placeholder="Destination" required><br>
        <input type="text" id="method" placeholder="Method (e.g. Air)" required><br>
        <button type="submit">Add Shipment</button>
    </form>

    <script>
        document.getElementById('shipmentForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                tracking_number: document.getElementById('tracking_number').value,
                status: document.getElementById('status').value,
                origin: document.getElementById('origin').value,
                destination: document.getElementById('destination').value,
                method: document.getElementById('method').value
            };
            
            const response = await fetch('/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert('Shipment Added Successfully!');
        };
    </script>
</body>
</html>
